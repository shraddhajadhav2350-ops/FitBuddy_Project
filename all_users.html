<!DOCTYPE html>
<html>
<head>
<title>All Users</title>
<style>
body{
font-family: Arial;
text-align:center;
background:#f4f4f4;
}

form{
background:white;
padding:20px;
width:300px;
margin:auto;
border-radius:10px;
}
</style>
</head>

<body>

<h1>All Users Data</h1>

<table border="1">

<tr>
<th>ID</th>
<th>Name</th>
<th>Age</th>
<th>Weight</th>
<th>Goal</th>
<th>Intensity</th>
</tr>

{% for user in users %}

<tr>
<td>{{ user.id }}</td>
<td>{{ user.name }}</td>
<td>{{ user.age }}</td>
<td>{{ user.weight }}</td>
<td>{{ user.goal }}</td>
<td>{{ user.intensity }}</td>
</tr>

{% endfor %}

</table>

</body>
</html>
